services:
  - type: web
    name: mirrorcue-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mirrorcue-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: mirrorcue-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

databases:
  - name: mirrorcue-db
    databaseName: mirrorcue
    user: mirrorcue_user
    plan: free
